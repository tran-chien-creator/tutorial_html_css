<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML - Input Upload - Datetime Local - Extra</title>
  </head>
  <body>
    <!-- HTML - Input Upload -->
    <h2>HTML - Input Upload</h2>
    <form action="" method="get" enctype="multipart/form-data">
      <div style="display: flex; flex-flow: column; gap: 20px">
        <div style="display: flex; flex-flow: column; gap: 20px">
          <label for="upload-file">Avatar:</label>
          <input
            type="file"
            name="upload-file"
            id="upload-file"
            accept="image/*"
          />
        </div>
        <div>
          <button type="submit">Upload</button>
        </div>
      </div>
    </form>

    <!-- HTML - Input Datetime Local -->
    <h2>HTML - Input Datetiem Local</h2>
    <form action="" method="get">
      <label for="">Datetime Local</label>
      <input type="datetime-local" />
      <button type="submit">Send</button>
    </form>

    <!--HTML Details Summary  -->
    <h2>HTML Details Summary</h2>
    <details>
      <summary>Chi tiết đơn hàng</summary>
      <p>- Tên sản phẩm: Truyện tranh Doraemon -</p>
      <p>- Giá: 50.000vnđ -</p>
      <p>- Ngày đặt: 01/01/2000 -</p>
    </details>

    <!-- HTML Progress -->
    <h2>HTML Progress</h2>
    <label for="">Đang tải dữ liệu....</label>
    <progress value="60" max="100"></progress>

    <!-- HTML Meter -->
    <h2>HTML Meter</h2>
    <label for="">Nhiệt độ CPU:</label>
    <meter value="50" min="0" max="100" low="50" optimum="60" high="85"></meter>
  </body>
</html>
