<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML - Input Upload</title>
  </head>
  <body>
    <!-- HTML - Input Upload -->
    <h2>HTML - Input Upload</h2>
    <form action="" method="get" enctype="multipart/form-data">
      <div style="display: flex; flex-flow: column; gap: 20px">
        <div style="display: flex; flex-flow: column; gap: 20px">
          <label for="upload-file">Avatar:</label>
          <input
            type="file"
            name="upload-file"
            id="upload-file"
            accept="image/*"
          />
        </div>
        <div>
          <button type="submit">Upload</button>
        </div>
      </div>
    </form>
  </body>
</html>
