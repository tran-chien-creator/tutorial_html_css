<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS - Animation</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Transiton with AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <!-- Animation with CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <style>
      [data-aos] {
        visibility: hidden;
      }
      [data-aos].animate__animated {
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <!-- <div class="box">Test Animation</div>
    <div class="box2">Test Animation</div>
    <div class="box3">Test Animation</div> -->

    <!-- Build loading -->
    <div class="loading"><span class="loading__span">Loading...</span></div>

    <!-- Build loading v2 -->
    <div class="loading-2">
      <div class="spiner">Loading...</div>
    </div>

    <!-- Library AOS -->
    <div data-aos="animate__animated animate__zoomIn" class="test-aos"></div>

    <!-- Animate CDN -->
    <div class="heading" data-aos="animate__animated animate__rubberBand">
      How it works
    </div>
    <!-- Script Animation -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <!-- Áp dụng chung cho toàn bộ AOS -->
    <script>
      AOS.init({
        // Animate
        useClassNames: true,
        initClassName: false,
        animatedClassName: "animate__animated",
        // delay: 1000,
        offset: 0,
        // duration: 400,
        // easing: "linear",
        once: false,
        mirror: false,
        // anchorPlacement: "top-bottom",
      });
    </script>
  </body>
</html>
