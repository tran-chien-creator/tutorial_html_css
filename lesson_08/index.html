<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML -Semantic - Entities</title>
  </head>
  <body>
    <!-- HTML - Semantic -->
    <div class="header">Khu vực dành cho "Header" không ngữ nghĩa</div>
    <hr />
    <header>Khu vực dành cho "Header" có ngữ nghĩa</header>
    <hr />
    <!-- HTML - Entites -->
    <p>Thẻ &lt;div&gt; dùng để tạo ra 1 khối để chức các phần tử khác</p>
    <hr />
    <!-- HTML - Symbols -->
    <p>Ký hiệu copy trong HTML &copy; tương ứng đoạn lệnh sau "&amp;copy"</p>
    <hr />
    <!-- HTML - Emojis -->
    <p>Biểu tượng coffee mặt cười trong &#9989</p>
  </body>
</html>
