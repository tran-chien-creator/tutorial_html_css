<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS - Grid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grid-box">
      <div class="box box-1">1</div>
      <div class="box box-2">2</div>
      <div class="box box-3">3</div>
      <div class="box box-4">4</div>
      <div class="box box-5">5</div>
      <div class="box box-6">6</div>
    </div>

    <div class="container">
      <div class="box box1">Item 1</div>
      <div class="box box2">Item 2</div>
      <div class="box box3">Item 3</div>
      <div class="box box4">Item 4</div>
      <div class="box box5">Item 5</div>
      <div class="box box6">Item 5</div>
    </div>
    <!-- CSS Grid Auto Flow -->
    <div class="container-1">
      <div class="box box_1">Item 1</div>
      <div class="box box_2">Item 2</div>
      <div class="box box_3">Item 3</div>
      <div class="box box_4">Item 4</div>
      <div class="box box_5">Item 5</div>
      <div class="box box_6">Item 6</div>
    </div>
  </body>
</html>
