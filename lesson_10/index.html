<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML - Form - Input Basic</title>
  </head>
  <body>
    <!-- HTML - Input Basic -->
    <h2>Input Basic</h2>
    <form action="" name="resgister-form" method="get">
      <div style="display: flex; flex-flow: column; gap: 10px">
        <div>
          <label for="username">Username:</label>
          <input type="text" name="username" id="username" required />
        </div>
        <div>
          <label for="email">Email:</label>
          <input type="email" name="email" id="email" />
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" name="password" id="password" />
        </div>
        <div>
          <label for="date">Date Birth Day:</label>
          <input type="datetime" name="date" id="date" />
        </div>
        <div>
          <label for="color">Your favourite color:</label>
          <input type="color" name="color" id="color" />
        </div>
        <div>
          <button type="submit">Resgister</button>
        </div>
      </div>
    </form>
  </body>
</html>
