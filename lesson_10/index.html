<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      HTML - Form - Input Basic - Radio - Checkbox - Textarea - Select(option) -
      Button(Submit & Reset) - Validation
    </title>
  </head>
  <body>
    <!-- HTML - Input Basic -->
    <h2>Input Basic</h2>
    <form action="" name="resgister-form" method="get">
      <div style="display: flex; flex-flow: column; gap: 10px">
        <div>
          <label for="username">Username:</label>
          <input type="text" name="username" id="username" required />
        </div>
        <div>
          <label for="email">Email:</label>
          <input type="email" name="email" id="email" />
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" name="password" id="password" />
        </div>
        <div>
          <label for="date">Date Birth Day:</label>
          <input type="datetime" name="date" id="date" />
        </div>
        <div>
          <label for="color">Your favourite color:</label>
          <input type="color" name="color" id="color" />
        </div>
        <div>
          <button type="submit">Resgister</button>
        </div>
      </div>
    </form>

    <!-- HTML - Radio - Checkbox  -->
    <h2>HTML - Radio - Checkbox</h2>
    <form action="" name="resgister-form-2" method="post">
      <div style="display: flex; flex-flow: column; gap: 20px">
        <div>
          <label for="username-2">Họ và tên</label>
          <input
            type="text"
            name="username"
            id="username-2"
            placeholder="Trần Văn A"
            required
          />
        </div>
        <div>
          <label for="gender">Giới tính</label>
          <input type="radio" name="gender" value="Nam" id="male" />Nam
          <input type="radio" name="gender" value="Nữ" id="female" />Nữ
        </div>
        <div>
          <label for="hobbies">Sở thích</label>
          <input type="checkbox" name="hobby" id="football" value="Đá bóng" />Đá
          bóng
          <input
            type="checkbox"
            name="hobby"
            id="play-game"
            value="Chơi game"
          />Chơi game
          <input type="checkbox" name="hobby" id="fishing" value="Câu cá" />Câu
          cá
        </div>
        <div>
          <button type="submit">Send</button>
        </div>
      </div>
    </form>

    <!-- HTML - Textarea - Select(option) - Button(Submit & Reset) -->
    <h2>HTML - Textarea - Select(option) - Button(Submit & Reset)</h2>
    <form action="" name="resgister-form-3" method="get">
      <div style="display: flex; flex-flow: column; gap: 20px">
        <div>
          <label for="username-3">Họ và tên</label>
          <input
            type="text"
            name="username-3"
            id="username-3"
            placeholder="Trần Văn A"
            required
            minlength="10"
          />
        </div>
        <div>
          <label for="email-3">Email</label>
          <input type="email" name="email-3" autocomplete="on" />
        </div>
        <div>
          <label for="phone">Số điện thoại</label>
          <input
            type="tel"
            required
            pattern="^[0-9]{10}$"
            title="Enter 10 digits"
            name="email-3"
          />
        </div>
        <div>
          <label for="address">Địa chỉ</label>
          <select name="address" id="address" multiple>
            <option value="Hà Nội">Hà Nội</option>
            <option value="Nam Định">Nam Định</option>
          </select>
        </div>
        <div>
          <label for="note">Ghi chú</label>
          <textarea
            name="note"
            cols="30"
            rows="3"
            placeholder="Enter your note here"
          ></textarea>
        </div>
        <div>
          <button type="submit">Send</button>
          <button type="reset">Reset</button>
        </div>
      </div>
    </form>

    <!-- HTML - Homework -->
    <h2>HTML Homework</h2>
    <form action="">
      <label for="quantity">Số lượng</label>
      <input type="number" name="quantity" min="1" max="50" />
      <br /><br />
      <label for="date-4">Date</label>
      <input type="date" name="date-4" min="2026-03-19" max="2026-03-20" />
      <button type="submit">Send</button>
    </form>
  </body>
</html>
