<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML - Form</title>
  </head>
  <body>
    <!-- HTML - Form -->
    <h2>HTML - Form</h2>
    <form
      action="https://www.google.com/search"
      autocomplete="on"
      target="_blank"
    >
      <label for="search">Keyword:</label> <br />
      <input
        type="text"
        name="q"
        id="search"
        placeholder="Tìm kiếm thông tin trên google"
      />
      <br />
      <button type="submit">Tìm kiếm</button>
    </form>
  </body>
</html>
