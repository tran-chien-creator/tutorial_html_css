<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML - Form - Video - Audio</title>
  </head>
  <body>
    <!-- HTML - Form -->
    <h2>HTML - Form</h2>
    <form
      action="https://www.google.com/search"
      autocomplete="on"
      target="_blank"
    >
      <label for="search">Keyword:</label> <br />
      <input
        type="text"
        name="q"
        id="search"
        placeholder="Tìm kiếm thông tin trên google"
      />
      <br />
      <button type="submit">Tìm kiếm</button>
    </form>

    <!-- HTML - Video -->
    <h2>Video</h2>
    <video width="300px" height="200px" controls loop>
      <source src="scroll_video.mp4" type="video/mp4" />
      Trình duyệt không hỗ trợ định dạng video này!
    </video>

    <!-- HTML - Audio -->
    <h2>Audio</h2>
    <audio controls loop>
      <source src="Author.mp3" type="audio/mp3" />
      Trình duyệt không hỗ trợ định dạng audio này
    </audio>
  </body>
</html>
